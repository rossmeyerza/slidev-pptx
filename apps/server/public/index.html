<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deckhand</title>
    <style>
      :root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f6f7f9; color: #1f2937; }
      main { width: min(720px, calc(100vw - 48px)); }
      h1 { font-size: 28px; line-height: 1.2; margin: 0 0 12px; }
      p { line-height: 1.6; margin: 0 0 16px; color: #4b5563; }
      code { background: #e5e7eb; border-radius: 4px; padding: 2px 5px; }
      @media (prefers-color-scheme: dark) {
        body { background: #101418; color: #e5e7eb; }
        p { color: #aab3bf; }
        code { background: #1f2937; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Deckhand</h1>
      <p>The v1 server is running. Mount a built web app with <code>SLIDEV_AGENT_WEB_DIR</code>, or place static assets in <code>apps/server/public</code>.</p>
      <p>Try <code>GET /api/health</code> or <code>GET /api/decks</code>.</p>
    </main>
  </body>
</html>
