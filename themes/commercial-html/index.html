<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deck</title>
    <link rel="stylesheet" href="./runtime.css">
    <link rel="stylesheet" href="./theme.css">
  </head>
  <body>
    <!-- Runtime shell. Do not edit: deck content lives in deck.json, slides/, and theme.css. -->
    <div class="deck-viewport">
      <main class="deck-stage" data-stage aria-live="polite"></main>
    </div>

    <nav class="deck-controls" aria-label="Slide controls">
      <button type="button" data-prev aria-label="Previous slide">‹</button>
      <span data-counter>–</span>
      <button type="button" data-next aria-label="Next slide">›</button>
      <button type="button" data-toggle-index aria-label="Slide index">☰</button>
    </nav>

    <div class="deck-index" data-index hidden>
      <div class="deck-index-panel">
        <h2>Slides</h2>
        <ol data-index-list></ol>
      </div>
    </div>

    <script src="./runtime.js"></script>
  </body>
</html>
