<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deck</title>
    <link rel="stylesheet" href="./runtime.css">
    <link rel="stylesheet" href="./theme.css">
  </head>
  <body>
    <!-- Runtime shell. Do not edit: deck content lives in deck.json, slides/, and theme.css. -->
    <div class="deck-viewport" data-viewport>
      <main class="deck-stage" data-stage aria-live="polite"></main>
    </div>

    <div class="deck-progress" data-progress aria-hidden="true"><span data-progress-fill></span></div>

    <!-- Nav bar, overview grid, goto input, drawing toolbar, and the presenter
         layout are all built by runtime.js so icons and behavior stay in one file. -->
    <div class="deck-nav-wrapper" data-nav-wrapper>
      <nav class="deck-controls" data-controls aria-label="Slide controls"></nav>
    </div>

    <script src="./runtime.js"></script>
  </body>
</html>
